<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - CASRAD</title>
    <link rel="stylesheet" href="/static/css/dracula.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <span class="nav-brand">CASRAD</span>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/library" class="nav-link active">Library</a></li>
                <li><a href="/playlists" class="nav-link">Playlists</a></li>
                <li><a href="/podcasts" class="nav-link">Podcasts</a></li>
                <li><a href="/broadcasts" class="nav-link">Broadcasts</a></li>
                <li><a href="/admin" class="nav-link">Admin</a></li>
            </ul>
        </div>
    </nav>

    <aside class="sidebar">
        <ul class="sidebar-menu">
            <li class="sidebar-item"><a href="/library" class="sidebar-link active">All Music</a></li>
            <li class="sidebar-item"><a href="/library/artists" class="sidebar-link">Artists</a></li>
            <li class="sidebar-item"><a href="/library/albums" class="sidebar-link">Albums</a></li>
            <li class="sidebar-item"><a href="/library/tracks" class="sidebar-link">Tracks</a></li>
            <li class="sidebar-item"><a href="/library/genres" class="sidebar-link">Genres</a></li>
            <li class="sidebar-item"><a href="/library/recent" class="sidebar-link">Recently Added</a></li>
            <li class="sidebar-item"><a href="/library/favorites" class="sidebar-link">Favorites</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="container">
            <h1>Music Library</h1>
            
            <div class="card">
                <input type="text" class="form-control" placeholder="Search library..." id="search">
            </div>

            <div id="library-content" class="album-grid">
                <!-- Populated by JavaScript -->
            </div>
        </div>
    </main>

    <div class="player">
        <div class="container">
            <div class="player-controls">
                <button class="player-btn" id="shuffle"><span>🔀</span></button>
                <button class="player-btn" id="previous"><span>⏮</span></button>
                <button class="player-btn play-btn" id="play"><span>▶️</span></button>
                <button class="player-btn" id="next"><span>⏭</span></button>
                <button class="player-btn" id="repeat"><span>🔁</span></button>
            </div>
            <div class="progress" id="progress">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/vue.min.js"></script>
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/js/player.js"></script>
    <script src="/static/js/casrad.js"></script>
</body>
</html>

# ReadTheDocs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html
# NOTE: Update os/python to latest LTS versions periodically

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: docs/requirements.txt

{{/* Base layout template - See AI.md PART 16 */}}
<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="{{.Theme}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{.Description}}">
    <title>{{.Title}} - CASRAD</title>
    <link rel="stylesheet" href="/static/css/theme.css">
    {{block "head" .}}{{end}}
</head>
<body class="theme-{{.Theme}}">
    {{block "header" .}}
    <header class="container">
        <nav>
            <a href="/">CASRAD</a>
        </nav>
    </header>
    {{end}}

    <main class="container">
        {{block "content" .}}{{end}}
    </main>

    {{block "footer" .}}
    <footer>
        <p>Powered by CASRAD</p>
    </footer>
    {{end}}

    {{block "scripts" .}}{{end}}
</body>
</html>

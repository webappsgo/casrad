# CASRAD - Complete Audio Streaming, Radio, and Distribution
# See AI.md PART 27 for Docker specification
# nginx proxy address - http://172.17.0.1:80

name: casrad

x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  server:
    image: ghcr.io/casapps/casrad:latest
    container_name: casrad-server
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    pull_policy: always
    restart: always
    logging: *default-logging

    ports:
      # HTTP (internal port is always 80)
      - "80:80"
      # MPD Protocol
      - "6600:6600"
      # RTMP Streaming
      - "1935:1935"

    volumes:
      # Config and data directories
      - casrad_config:/config/casrad
      - casrad_data:/data/casrad
      - casrad_logs:/data/log/casrad
      - casrad_backups:/data/backups/casrad

      # Music directories (customize these paths)
      - /mnt/Music/Mp3:/mnt/Music/Mp3:ro
      - /mnt/Podcasts:/mnt/Podcasts:ro
      - /mnt/Audiobooks:/mnt/Audiobooks:ro
      - /mnt/Playlists:/mnt/Playlists:ro

    environment:
      # Mode: production (strict host validation) or development (relaxed)
      MODE: production
      TZ: America/New_York
      # DEBUG: "false"  # Uncomment to enable debug endpoints

      # Server configuration
      ADDRESS: 0.0.0.0
      PORT: 80

      # Database (SQLite is default)
      # DB_DRIVER: sqlite
      # DB_PATH: /config/casrad/server.db

      # Optional: PostgreSQL
      # DB_DRIVER: postgres
      # DB_HOST: db
      # DB_PORT: 5432
      # DB_NAME: casrad
      # DB_USER: casrad
      # DB_PASS: changeme

      # Optional: Valkey/Redis cache
      # CACHE_DRIVER: valkey
      # CACHE_HOST: cache
      # CACHE_PORT: 6379

    healthcheck:
      test: ["CMD", "/usr/local/bin/casrad", "--status"]
      interval: 5m
      timeout: 15s
      retries: 3
      start_period: 10m

    networks:
      - casrad

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Optional: PostgreSQL database for production
  # db:
  #   image: postgres:16-alpine
  #   container_name: casrad-db
  #   restart: always
  #   pull_policy: always
  #   logging: *default-logging
  #   environment:
  #     POSTGRES_DB: casrad
  #     POSTGRES_USER: casrad
  #     POSTGRES_PASSWORD: changeme
  #   volumes:
  #     - postgres_data:/data/db/postgres
  #   networks:
  #     - casrad
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U casrad"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Optional: Valkey/Redis cache
  # cache:
  #   image: valkey/valkey:alpine
  #   container_name: casrad-cache
  #   restart: always
  #   pull_policy: always
  #   logging: *default-logging
  #   command: valkey-server --maxmemory 256mb --maxmemory-policy allkeys-lru
  #   volumes:
  #     - valkey_data:/data/db/valkey
  #   networks:
  #     - casrad
  #   healthcheck:
  #     test: ["CMD", "valkey-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

networks:
  casrad:
    driver: bridge
    external: false

volumes:
  # CASRAD volumes
  casrad_config:
    driver: local
  casrad_data:
    driver: local
  casrad_logs:
    driver: local
  casrad_backups:
    driver: local

  # Optional database volumes
  # postgres_data:
  #   driver: local
  # valkey_data:
  #   driver: local

name: casrad-test

services:
  casrad:
    image: ghcr.io/casapps/casrad:latest
    container_name: casrad-test
    restart: "no"
    environment:
      - MODE=development
      - DEBUG=true
      - TZ=America/New_York
    ports:
      - "64581:80"
    volumes:
      # TEMP DIR WORKFLOW: ./rootfs/ resolves to $TEMP_DIR/rootfs/
      # NEVER run from project directory - always use temp dir workflow
      - ./rootfs/config:/config
      - ./rootfs/data:/data
    networks:
      - casrad-test

networks:
  casrad-test:
    name: casrad-test
    external: false
